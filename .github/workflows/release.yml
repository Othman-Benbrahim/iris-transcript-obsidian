name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      # Build reproductible : installe exactement les versions du lockfile.
      - run: npm ci

      - run: npm run build

      # Atteste la provenance des artefacts (vérifiable cryptographiquement).
      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # Crée la Release dont le NOM = le tag (donc inclut la version),
      # avec les trois fichiers attachés individuellement.
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
